<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vikentis One | Mobile Check-in</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --teal: #008080; --dark: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .toggle-container { display: flex; background: #444; border-radius: 10px; margin: 20px 0; padding: 5px; }
        .toggle-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; color: white; background: transparent; cursor: pointer; }
        .toggle-btn.active { background: var(--teal); font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        .camera-box { border: 2px dashed #666; padding: 20px; border-radius: 10px; margin: 10px 0; position: relative; }
        .camera-box.ready { border-color: var(--teal); background: rgba(0,128,128,0.1); }
        .btn-upload { background: var(--teal); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; margin-top: 20px; }
        .btn-upload:disabled { background: #444; color: #888; }
        .hidden { display: none; }
        img.preview { width: 100%; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--teal)">VIKENTIS ONE</h2>
        <p>Guest Self Check-in</p>

        <input type="text" id="guestName" placeholder="Full Name (as per document)">

        <div class="toggle-container">
            <button id="btnPassport" class="toggle-btn active" onclick="setDocType('passport')">Passport</button>
            <button id="btnID" class="toggle-btn" onclick="setDocType('id_card')">ID Card</button>
        </div>

        <div class="camera-box" id="boxFront">
            <span id="labelFront">Scan Passport Page</span>
            <input type="file" id="fileFront" accept="image/*" capture="environment" onchange="preview(this, 'viewFront', 'boxFront')">
            <img id="viewFront" class="preview hidden">
        </div>

        <div class="camera-box hidden" id="boxBack">
            <span>Scan Back (MRZ Side)</span>
            <input type="file" id="fileBack" accept="image/*" capture="environment" onchange="preview(this, 'viewBack', 'boxBack')">
            <img id="viewBack" class="preview hidden">
        </div>

        <button id="submitBtn" class="btn-upload" onclick="upload()" disabled>Upload & Submit</button>
        <p id="status"></p>
    </div>

    <script>
        const SB_URL = 'https://tokfvejinrklyysffont.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRva2Z2ZWppbnJrbHl5c2Zmb250Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjkwNzEsImV4cCI6MjA4NjkwNTA3MX0.iIe4jzOTd2mw0n0GCEnFSeySu0ct76g4Mwxuq1WwWxE';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        let docType = 'passport';

        function setDocType(type) {
            docType = type;
            document.getElementById('btnPassport').classList.toggle('active', type === 'passport');
            document.getElementById('btnID').classList.toggle('active', type === 'id_card');
            document.getElementById('boxBack').classList.toggle('hidden', type === 'passport');
            document.getElementById('labelFront').innerText = type === 'passport' ? 'Scan Passport Page' : 'Scan Front (Photo Side)';
            checkReady();
        }

        function preview(input, imgId, boxId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    document.getElementById(boxId).classList.add('ready');
                    checkReady();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function checkReady() {
            const name = document.getElementById('guestName').value;
            const front = document.getElementById('fileFront').files.length > 0;
            const back = document.getElementById('fileBack').files.length > 0;
            
            const isReady = docType === 'passport' ? (name && front) : (name && front && back);
            document.getElementById('submitBtn').disabled = !isReady;
        }

        async function uploadFile(file, folder) {
            const ext = file.name.split('.').pop();
            const path = `${folder}/${Date.now()}-${Math.random().toString(36).substring(7)}.${ext}`;
            const { data, error } = await supabase.storage.from('passport-uploads').upload(path, file);
            if (error) throw error;
            return path;
        }

        async function upload() {
            const status = document.getElementById('status');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            status.innerText = "Processing... Please wait.";

            try {
                const frontFile = document.getElementById('fileFront').files[0];
                const frontPath = await uploadFile(frontFile, 'front');
                
                let backPath = null;
                if (docType === 'id_card') {
                    const backFile = document.getElementById('fileBack').files[0];
                    backPath = await uploadFile(backFile, 'back');
                }

                const { error } = await supabase.from('identity_staging_area').insert([{
                    guest_name: document.getElementById('guestName').value,
                    image_path_front: frontPath,
                    image_path_back: backPath,
                    doc_type: docType
                }]);

                if (error) throw error;
                document.body.innerHTML = "<div class='card'><h1>✅</h1><h2>Thank You!</h2><p>Your document has been sent to the reception desk.</p></div>";
            } catch (err) {
                status.innerText = "Error: " + err.message;
                btn.disabled = false;
            }
        }

        document.getElementById('guestName').addEventListener('input', checkReady);
    </script>
</body>
</html>
